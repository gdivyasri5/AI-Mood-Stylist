<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Mood Stylist | Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="app" class="max-w-2xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-600">👗 MoodStylist AI (Pro)</h1>
            <p class="text-gray-500 mt-2">Your Advanced Personal Fashion Assistant</p>
        </header>

        <div id="wizard" class="bg-white p-8 rounded-3xl shadow-2xl border border-gray-100">
            <div id="question-container">
                <h2 id="question-text" class="text-2xl font-bold mb-6 text-gray-800">Let's build your profile...</h2>
                <div id="options" class="grid grid-cols-2 gap-4">
                    </div>
            </div>
            <div class="mt-8 bg-gray-200 h-2 rounded-full w-full">
                <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-500" style="width: 20%"></div>
            </div>
        </div>

        <div id="result" class="hidden bg-white p-8 rounded-3xl shadow-2xl text-center border border-gray-100">
            <h2 class="text-3xl font-extrabold mb-2 text-indigo-600">Your Custom Look is Ready!</h2>
            <p class="text-gray-500 mb-6">Tailored to your body, mood, and budget.</p>
            
            <img id="res-avatar" src="" alt="Selected Avatar" class="mx-auto w-40 h-40 rounded-full border-4 border-indigo-200 mb-6 bg-indigo-50 shadow-inner" />
            
            <div class="text-left space-y-4 bg-gray-50 p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-lg"><strong>👗 Outfit:</strong> <span id="res-dress" class="text-indigo-700 font-medium"></span></p>
                <p class="text-lg"><strong>💇‍♀️ Hairstyle:</strong> <span id="res-hair" class="text-indigo-700 font-medium"></span></p>
                <p class="text-lg"><strong>💍 Accessories:</strong> <span id="res-acc" class="text-indigo-700 font-medium"></span></p>
                <p class="text-lg"><strong>💰 Your Budget:</strong> <span id="res-budget" class="text-green-600 font-bold"></span></p>
            </div>
            
            <hr class="my-8 border-gray-200">
            
            <h3 class="text-xl font-bold mb-4 text-gray-800">Shop Your Look (Matched to Budget):</h3>
            
            <div id="shop-links" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>

            <button onclick="location.reload()" class="mt-8 text-indigo-500 font-bold hover:text-indigo-700 underline transition">↺ Create Another Look</button>
        </div>
    </div>

    <script>
        const questions = [
            { 
                q: "1. Choose your base Avatar style:", 
                type: "image",
                options: [
                    { label: "Style 1", val: "https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&hair=long16&backgroundColor=b6e3f4" },
                    { label: "Style 2", val: "https://api.dicebear.com/7.x/adventurer/svg?seed=Aneka&hair=short02&backgroundColor=ffdfbf" },
                    { label: "Style 3", val: "https://api.dicebear.com/7.x/adventurer/svg?seed=Jocelyn&hair=long19&backgroundColor=c0aede" },
                    { label: "Style 4", val: "https://api.dicebear.com/7.x/adventurer/svg?seed=Jack&hair=short16&backgroundColor=d1d4f9" }
                ], 
                key: "avatar" 
            },
            { q: "2. What is your body size?", type: "text", options: ["XS - Small", "Medium", "Large", "XL - Plus Size"], key: "size" },
            { q: "3. How are you feeling today?", type: "text", options: ["Happy 😊", "Romantic 💖", "Professional 💼", "Party 🔥", "Chill ☁️"], key: "mood" },
            { q: "4. What event are you dressing for?", type: "text", options: ["Wedding / Festival", "Office / Interview", "Date Night", "Casual / College", "Gym / Active"], key: "event" },
            { q: "5. What is your shopping budget?", type: "text", options: ["Under ₹1000", "₹1000 - ₹3000", "₹3000 - ₹5000", "₹5000+ (Premium)"], key: "budget" }
        ];

        let currentStep = 0;
        let userData = {};

        function loadQuestion() {
            const q = questions[currentStep];
            document.getElementById('question-text').innerText = q.q;
            
            // Update Progress Bar
            const progress = ((currentStep + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "p-4 border-2 border-indigo-100 rounded-2xl hover:border-indigo-600 hover:bg-indigo-50 transition-all flex flex-col items-center justify-center font-bold text-gray-700 shadow-sm hover:shadow-md";
                
                if (q.type === "image") {
                    btn.innerHTML = `<img src="${opt.val}" class="w-24 h-24 mb-3 rounded-full border-2 border-transparent shadow-sm" /> ${opt.label}`;
                    btn.onclick = () => handleAnswer(q.key, opt.val);
                } else {
                    btn.innerText = opt;
                    btn.onclick = () => handleAnswer(q.key, opt);
                }
                optionsDiv.appendChild(btn);
            });
        }

        function handleAnswer(key, value) {
            userData[key] = value;
            currentStep++;
            if (currentStep < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('wizard').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

            document.getElementById('res-avatar').src = userData.avatar;
            document.getElementById('res-budget').innerText = userData.budget;

            // --- SMART AI FASHION LOGIC ---
            let outfit, hair, acc, query;

            if (userData.event.includes("Wedding")) {
                outfit = userData.mood.includes("Happy") ? "Bright Floral Silk Lehenga / Heavy Kurta Set" : "Classic Elegant Saree / Sherwani";
                hair = "Elegant Updo / Traditional Neat Styling";
                acc = "Heavy Statement Jewelry & Bangles";
                query = "wedding+ethnic+wear";
            } else if (userData.event.includes("Office")) {
                outfit = "Structured Power Suit or Tailored Trousers with Crisp Shirt";
                hair = "Sleek Low Bun / Formal Partition";
                acc = "Minimalist Leather Watch & Stud Earrings";
                query = "formal+office+wear";
            } else if (userData.event.includes("Date Night")) {
                outfit = userData.mood.includes("Romantic") ? "Flowing Red Midi Dress / Smart Casual Shirt" : "Chic All-Black Outfit";
                hair = "Soft Romantic Curls / Textured Style";
                acc = "Layered Necklaces & Delicate Rings";
                query = "date+night+outfit";
            } else if (userData.event.includes("Gym")) {
                outfit = "High-Stretch Seamless Activewear Co-ord Set";
                hair = "High Ponytail / Secure Braids";
                acc = "Fitness Smartwatch & Sports Duffle Bag";
                query = "gym+activewear";
            } else {
                outfit = "Trendy Oversized Graphic Tee with Baggy Cargo Jeans";
                hair = "Messy Casual Bun / Cap";
                acc = "Chunky Sneakers & Canvas Tote Bag";
                query = "casual+streetwear+fashion";
            }

            document.getElementById('res-dress').innerText = outfit;
            document.getElementById('res-hair').innerText = hair;
            document.getElementById('res-acc').innerText = acc;

            // --- DYNAMIC MARKETPLACE LOGIC ---
            const shopLinks = document.getElementById('shop-links');
            shopLinks.innerHTML = ''; 

            const stores = [];
            
            if (userData.budget === "Under ₹1000") {
                // Low Budget
                stores.push({ name: "Meesho", color: "bg-pink-600", text: "text-white", url: `https://www.meesho.com/search?q=${query}` });
                stores.push({ name: "Flipkart", color: "bg-blue-600", text: "text-white", url: `https://www.flipkart.com/search?q=${query}` });
            } else if (userData.budget === "₹1000 - ₹3000") {
                // Medium Budget
                stores.push({ name: "Myntra", color: "bg-pink-500", text: "text-white", url: `https://www.myntra.com/${query.replace(/\+/g, '-')}` });
                stores.push({ name: "Amazon", color: "bg-yellow-400", text: "text-black", url: `https://www.amazon.in/s?k=${query}` });
                stores.push({ name: "Ajio", color: "bg-teal-700", text: "text-white", url: `https://www.ajio.com/search/?text=${query}` });
            } else {
                // High Budget
                stores.push({ name: "Ajio Luxe", color: "bg-black", text: "text-white", url: `https://www.ajio.com/search/?text=${query}` });
                stores.push({ name: "Myntra Premium", color: "bg-gray-800", text: "text-white", url: `https://www.myntra.com/${query.replace(/\+/g, '-')}` });
                stores.push({ name: "Zara / H&M Lookalikes", color: "bg-red-600", text: "text-white", url: `https://www.myntra.com/hm` });
            }

            // Generate Store Buttons
            stores.forEach(store => {
                const a = document.createElement('a');
                a.href = store.url;
                a.target = "_blank";
                a.className = `${store.color} ${store.text} py-3 px-4 rounded-xl font-extrabold shadow-lg hover:-translate-y-1 hover:shadow-xl transition-all block`;
                a.innerText = `Shop on ${store.name} 🛍️`;
                shopLinks.appendChild(a);
            });
        }

        // Start the app
        loadQuestion();
    </script>
</body>
</html>
