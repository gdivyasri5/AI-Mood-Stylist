<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Mood Stylist | Personal Fashion AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="app" class="max-w-xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-indigo-600">👗 MoodStylist AI</h1>
            <p class="text-gray-500">Professional Personalized Fashion Assistant</p>
        </header>

        <div id="wizard" class="bg-white p-8 rounded-2xl shadow-xl">
            <div id="question-container">
                <h2 id="question-text" class="text-2xl font-semibold mb-6">Hello! Let's build your style profile. What is your size?</h2>
                <div id="options" class="grid grid-cols-2 gap-4">
                    </div>
            </div>
        </div>

        <div id="result" class="hidden bg-white p-8 rounded-2xl shadow-xl text-center">
            <h2 class="text-2xl font-bold mb-4">Your Custom Look is Ready!</h2>
            <div id="avatar-display" class="mb-6 bg-indigo-50 p-4 rounded-full w-48 h-48 mx-auto flex items-center justify-center text-6xl">
                👤
            </div>
            <div class="text-left space-y-3">
                <p><strong>Dress:</strong> <span id="res-dress"></span></p>
                <p><strong>Hairstyle:</strong> <span id="res-hair"></span></p>
                <p><strong>Accessories:</strong> <span id="res-acc"></span></p>
            </div>
            <hr class="my-6">
            <div class="grid grid-cols-2 gap-4">
                <a id="link-myntra" href="#" target="_blank" class="bg-pink-500 text-white py-2 rounded-lg font-bold">Shop Myntra</a>
                <a id="link-amazon" href="#" target="_blank" class="bg-yellow-500 text-black py-2 rounded-lg font-bold">Shop Amazon</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What is your body size?", options: ["Small", "Medium", "Large", "XL"], key: "size" },
            { q: "What is your current mood?", options: ["Happy 😊", "Romantic 💖", "Professional 💼", "Party 🔥"], key: "mood" },
            { q: "What is the event?", options: ["Wedding", "Interview", "Date", "Gym"], key: "event" }
        ];

        let currentStep = 0;
        let userData = {};

        function loadQuestion() {
            const q = questions[currentStep];
            document.getElementById('question-text').innerText = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "p-4 border-2 border-indigo-100 rounded-xl hover:border-indigo-600 hover:bg-indigo-50 transition";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(q.key, opt);
                optionsDiv.appendChild(btn);
            });
        }

        function handleAnswer(key, value) {
            userData[key] = value;
            currentStep++;
            if (currentStep < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('wizard').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

            // Simple Logic for recommendations
            document.getElementById('res-dress').innerText = userData.mood + " Style Outfit for " + userData.event;
            document.getElementById('res-hair').innerText = "Elegant " + (userData.mood === 'Happy 😊' ? 'Open Waves' : 'Sleek Bun');
            document.getElementById('res-acc').innerText = "Matching Watch & Silver Jewelry";
            
            // Setting shop links based on event
            document.getElementById('link-myntra').href = `https://www.myntra.com/${userData.event.toLowerCase()}-dresses`;
            document.getElementById('link-amazon').href = `https://www.amazon.in/s?k=${userData.event.toLowerCase()}+fashion`;
        }

        loadQuestion();
    </script>
</body>
</html>
